<button class="hover:opacity-80 active:scale-95 transition-transform flex items-center justify-center">

</button>
</header>

</button>
</section>

<div class="flex flex-col gap-xl">

<button class="text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>

<div class="flex-1 text-center">Reps</div>
<div class="w-16 text-center">

</div>

<div class="w-12 text-center font-data-numeric text-data-numeric text-on-surface-variant">1</div>

<input class="w-full bg-surface-container-lowest text-center font-data-numeric text-data-numeric text-on-surface py-xs border-b-2 border-outline-variant focus:border-primary-fixed focus:ring-0 focus:outline-none transition-colors" type="number" value="225"/>

<div class="flex-1">
<input class="w-full bg-surface-container-lowest text-center font-data-numeric text-data-numeric text-on-surface py-xs border-b-2 border-outline-variant focus:border-primary-fixed focus:ring-0 focus:outline-none transition-colors" type="number" value="5"/>

<div class="w-16 flex justify-center">
<button class="w-8 h-8 bg-primary-fixed text-on-primary-fixed flex items-center justify-center rounded active:scale-95 transition-transform">

</button>
</div>
