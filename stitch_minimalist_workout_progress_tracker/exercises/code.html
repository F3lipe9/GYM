          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md text-body-md min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="bg-black border-b-2 border-[#1C1C1E] flex justify-between items-center w-full px-4 h-16 fixed top-0 z-40">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-[#CCFF00]" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span class="text-[#CCFF00] font-space-grotesk font-black uppercase tracking-tighter text-2xl tracking-widest">GYMLOG</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-[#1C1C1E]">
<!-- Placeholder for user_profile_avatar -->
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close up of an intense gym goer looking determined in dramatic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyX8peg3zyBZVbrKNWfDbQ9aoFn3pfcQMZA1g9UkEX9rhz3EroWh731S4M7oIVsRvikFE1R68vgloCytZ4H75aWTgX3dtG6Phe9m2R01jfhAwXg73KFeE3bAUnUsUTiJ7iNmwCr2pz0ITXfyqscu9Fg1FzBgVzZr3ebXTjM7srXcWXA9FPrvN_qiQDL3xoWco1t7tRTBXjwqG28yMwfzL8JenOorzeWGr3B7B59etPDWG5eW9V0kzXzIktexqqQ7U1h6kahK5-zRm9"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-[80px] pb-[88px] px-margin-mobile flex flex-col gap-lg w-full max-w-2xl mx-auto">
<!-- Search & Action Section -->
<section class="flex flex-col gap-md">
<!-- Search Bar -->
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full bg-surface-container border-b-2 border-outline-variant focus:border-primary-fixed outline-none text-on-surface py-md pl-[48px] pr-md font-label-bold text-label-bold uppercase tracking-wider transition-colors placeholder:text-on-surface-variant" placeholder="SEARCH EXERCISES..." type="text"/>
</div>
<!-- Add Custom Button -->
<button class="w-full bg-transparent border-2 border-primary-fixed text-primary-fixed font-label-bold text-label-bold py-md px-md rounded-DEFAULT flex justify-center items-center gap-sm uppercase tracking-wider hover:bg-primary-fixed hover:text-on-primary-fixed transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 700;">add</span>
                ADD CUSTOM
            </button>
</section>
<!-- Exercise Database (Segmented Grid) -->
<section class="flex flex-col gap-xl">
<!-- Category: Chest -->
<div class="flex flex-col gap-sm">
<h2 class="font-headline-md text-headline-md text-surface-variant uppercase border-b-2 border-surface-container pb-xs tracking-tight">CHEST</h2>
<div class="grid grid-cols-1 gap-xs">
<!-- Default Exercise (Locked) -->
<div class="bg-surface-container border border-surface-variant p-md flex items-center justify-between group">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface uppercase leading-none tracking-tight">BENCH PRESS</span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mt-1">BARBELL • COMPOUND</span>
</div>
<span class="material-symbols-outlined text-surface-variant">lock</span>
</div>
<!-- Default Exercise (Locked) -->
<div class="bg-surface-container border border-surface-variant p-md flex items-center justify-between group">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface uppercase leading-none tracking-tight">INCLINE DUMBBELL PRESS</span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mt-1">DUMBBELL • COMPOUND</span>
</div>
<span class="material-symbols-outlined text-surface-variant">lock</span>
</div>
</div>
</div>
<!-- Category: Back -->
<div class="flex flex-col gap-sm">
<h2 class="font-headline-md text-headline-md text-surface-variant uppercase border-b-2 border-surface-container pb-xs tracking-tight">BACK</h2>
<div class="grid grid-cols-1 gap-xs">
<!-- Default Exercise (Locked) -->
<div class="bg-surface-container border border-surface-variant p-md flex items-center justify-between group">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface uppercase leading-none tracking-tight">PULL-UPS</span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mt-1">BODYWEIGHT • COMPOUND</span>
</div>
<span class="material-symbols-outlined text-surface-variant">lock</span>
</div>
<!-- Custom Exercise (Deletable) -->
<div class="bg-surface-container border-l-4 border-l-primary-fixed border-y border-r border-surface-variant p-md flex items-center justify-between group relative overflow-hidden">
<div class="flex flex-col z-10">
<span class="font-headline-md text-headline-md text-on-surface uppercase leading-none tracking-tight">PENDLAY ROW</span>
<div class="flex items-center gap-xs mt-1">
<span class="bg-primary-fixed text-on-primary-fixed px-1 font-label-bold text-[10px] uppercase tracking-widest">CUSTOM</span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase">BARBELL</span>
</div>
</div>
<!-- Delete Action -->
<button class="z-10 text-error-container hover:text-error border border-transparent hover:border-error bg-surface-container-highest p-sm rounded-DEFAULT flex items-center justify-center transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete</span>
</button>
</div>
</div>
</div>
<!-- Category: Legs -->
<div class="flex flex-col gap-sm">
<h2 class="font-headline-md text-headline-md text-surface-variant uppercase border-b-2 border-surface-container pb-xs tracking-tight">LEGS</h2>
<div class="grid grid-cols-1 gap-xs">
<!-- Default Exercise (Locked) -->
<div class="bg-surface-container border border-surface-variant p-md flex items-center justify-between group">
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface uppercase leading-none tracking-tight">SQUAT</span>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mt-1">BARBELL • COMPOUND</span>
</div>
<span class="material-symbols-outlined text-surface-variant">lock</span>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-16 flex justify-around items-stretch z-50 border-t-2 border-[#1C1C1E] bg-black">
<!-- Inactive: Log -->
<a class="flex flex-col items-center justify-center text-white py-1 w-full h-full hover:bg-[#121212] active:bg-[#CCFF00] active:text-black transition-colors duration-100" href="#">
<span class="material-symbols-outlined">edit_note</span>
<span class="font-space-grotesk text-[10px] font-bold uppercase tracking-wider">Log</span>
</a>
<!-- Inactive: History -->
<a class="flex flex-col items-center justify-center text-white py-1 w-full h-full hover:bg-[#121212] active:bg-[#CCFF00] active:text-black transition-colors duration-100" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-space-grotesk text-[10px] font-bold uppercase tracking-wider">History</span>
</a>
<!-- Inactive: Progress -->
<a class="flex flex-col items-center justify-center text-white py-1 w-full h-full hover:bg-[#121212] active:bg-[#CCFF00] active:text-black transition-colors duration-100" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-space-grotesk text-[10px] font-bold uppercase tracking-wider">Progress</span>
</a>
<!-- Active: Exercises -->
<a class="flex flex-col items-center justify-center text-[#000000] bg-[#CCFF00] rounded-none py-1 w-full h-full transition-colors duration-100" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">list_alt</span>
<span class="font-space-grotesk text-[10px] font-bold uppercase tracking-wider">Exercises</span>
</a>
</nav>
